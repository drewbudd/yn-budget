version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: yn-budget-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - ${DB_VOLUME_PATH:-./data}:/app/data
    environment:
      - DEBUG=False
      - SECRET_KEY=generate-a-secure-secret-key-here
      - DATABASE_DIR=/app/data
      - ALLOWED_HOSTS=*
